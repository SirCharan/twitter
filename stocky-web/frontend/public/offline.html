<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Stocky AI — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0A0A;
      color: #F5F0EB;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      background: #111;
      border: 1px solid rgba(201, 169, 110, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .logo span {
      font-family: Georgia, serif;
      font-style: italic;
      font-weight: 600;
      font-size: 40px;
      color: #C9A96E;
    }
    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #F5F0EB;
    }
    p {
      font-size: 14px;
      color: #6B6B6B;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    button {
      background: #C9A96E;
      color: #0A0A0A;
      border: none;
      border-radius: 10px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      min-height: 44px;
    }
    button:active {
      transform: scale(0.97);
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="logo"><span>S</span></div>
  <h1>You're offline</h1>
  <p>Check your connection and try again.</p>
  <button onclick="window.location.reload()">Retry</button>
</body>
</html>
